# docker-compose.yml — Levanta todo el sistema de microservicios localmente.
# Uso: make up  (o docker compose up --build -d)
#
# Servicios:
#   postgres      → Base de datos compartida (mientras migras a BD-por-servicio)
#   auth-service  → gRPC :50051
#   usuarios-svc  → gRPC :50052
#   cursos-svc    → gRPC :50053
#   lecciones-svc → gRPC :50054
#   examenes-svc  → gRPC :50055
#   foros-svc     → gRPC :50056
#   gateway       → HTTP :8080  ← API (JSON/gRPC fan-out)
#   frontend      → HTTP :80    ← SPA servida por Nginx
#
# Puerto de Postgres expuesto al host solo en el perfil "dev":
#   docker compose --profile dev up
#
# Producción (sin exponer Postgres):
#   docker compose up --build -d

services:

  # ── Infraestructura ─────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-capacitaciones}
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Servicio auxiliar que expone el puerto de Postgres al host.
  # Actívalo solo con: docker compose --profile dev up
  postgres-dev-proxy:
    image: postgres:16-alpine
    profiles: [dev]
    network_mode: "service:postgres"
    command: ["sh", "-c", "echo 'postgres port exposed on host:5432 (dev profile)' && tail -f /dev/null"]
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5432:5432"

  # ── Auth service ─────────────────────────────────────────────────────────────
  auth-service:
    build:
      context: .
      dockerfile: services/auth/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL:         postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-secret}@postgres:5432/${POSTGRES_DB:-capacitaciones}?sslmode=disable
      GRPC_PORT:            "50051"
      JWT_SECRET:           ${JWT_SECRET}
      JWT_EXPIRY_HOURS:     ${JWT_EXPIRY_HOURS:-720}
      RECAPTCHA_SECRET_KEY: ${RECAPTCHA_SECRET_KEY:-}
      SMTP_HOST:            ${SMTP_HOST:-}
      SMTP_PORT:            ${SMTP_PORT:-587}
      SMTP_USER:            ${SMTP_USER:-}
      SMTP_PASS:            ${SMTP_PASS:-}
      SMTP_FROM:            ${SMTP_FROM:-}
      APP_URL:              ${APP_URL:-http://localhost:8080}
      APP_NAME:             ${APP_NAME:-Capacitaciones}
      LOG_LEVEL:            ${LOG_LEVEL:-info}
    expose:
      - "50051"

  # ── Usuarios service ──────────────────────────────────────────────────────────
  usuarios-service:
    build:
      context: .
      dockerfile: services/usuarios/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-secret}@postgres:5432/${POSTGRES_DB:-capacitaciones}?sslmode=disable
      GRPC_PORT:    "50052"
      LOG_LEVEL:    ${LOG_LEVEL:-info}
    expose:
      - "50052"

  # ── Cursos service ────────────────────────────────────────────────────────────
  cursos-service:
    build:
      context: .
      dockerfile: services/cursos/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-secret}@postgres:5432/${POSTGRES_DB:-capacitaciones}?sslmode=disable
      GRPC_PORT:    "50053"
      LOG_LEVEL:    ${LOG_LEVEL:-info}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      MENSAJES_ADDR: mensajes-service:50057
    expose:
      - "50053"

  # ── Lecciones service ─────────────────────────────────────────────────────────
  lecciones-service:
    build:
      context: .
      dockerfile: services/lecciones/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-secret}@postgres:5432/${POSTGRES_DB:-capacitaciones}?sslmode=disable
      GRPC_PORT:    "50054"
      LOG_LEVEL:    ${LOG_LEVEL:-info}
    expose:
      - "50054"

  # ── Examenes service ──────────────────────────────────────────────────────────
  examenes-service:
    build:
      context: .
      dockerfile: services/examenes/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-secret}@postgres:5432/${POSTGRES_DB:-capacitaciones}?sslmode=disable
      GRPC_PORT:    "50055"
      LOG_LEVEL:    ${LOG_LEVEL:-info}
    expose:
      - "50055"

  # ── Foros service ─────────────────────────────────────────────────────────────
  foros-service:
    build:
      context: .
      dockerfile: services/foros/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-secret}@postgres:5432/${POSTGRES_DB:-capacitaciones}?sslmode=disable
      GRPC_PORT:    "50056"
      LOG_LEVEL:    ${LOG_LEVEL:-info}
    expose:
      - "50056"

  # ── Mensajes service ──────────────────────────────────────────────────────────
  mensajes-service:
    build:
      context: .
      dockerfile: services/mensajes/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-secret}@postgres:5432/${POSTGRES_DB:-capacitaciones}?sslmode=disable
      GRPC_PORT:    "50057"
      LOG_LEVEL:    ${LOG_LEVEL:-info}
    expose:
      - "50057"

  # ── API Gateway ───────────────────────────────────────────────────────────────
  # Único contenedor expuesto al exterior. Recibe HTTP y hace fan-out a gRPC.
  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    restart: unless-stopped
    depends_on:
      - auth-service
      - usuarios-service
      - cursos-service
      - lecciones-service
      - examenes-service
      - foros-service
      - mensajes-service
    environment:
      PORT:           "8080"
      JWT_SECRET:     ${JWT_SECRET}
      ALLOWED_ORIGIN: ${ALLOWED_ORIGIN:-http://localhost:5173}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}

      # Direcciones internas de los microservicios (resolución DNS de Docker)
      AUTH_ADDR:      auth-service:50051
      USUARIOS_ADDR:  usuarios-service:50052
      CURSOS_ADDR:    cursos-service:50053
      LECCIONES_ADDR: lecciones-service:50054
      EXAMENES_ADDR:  examenes-service:50055
      FOROS_ADDR:     foros-service:50056
      MENSAJES_ADDR:  mensajes-service:50057

      # Cloudflare R2
      R2_BUCKET:      ${R2_BUCKET:-}
      R2_ENDPOINT:    ${R2_ENDPOINT:-}
      R2_ACCESS_KEY:  ${R2_ACCESS_KEY:-}
      R2_SECRET_KEY:  ${R2_SECRET_KEY:-}
      R2_PUBLIC_URL:  ${R2_PUBLIC_URL:-}

      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      GIN_MODE:       ${GIN_MODE:-release}
      LOG_LEVEL:      ${LOG_LEVEL:-info}
    ports:
      - "8080:8080"

  # ── Frontend (Nginx SPA) ──────────────────────────────────────────────────────
  # Contenedor independiente que sirve los assets estáticos de Vue.
  # En producción puede reemplazarse por Cloudflare Pages / Vercel sin
  # tocar el gateway.
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080}
    ports:
      - "80:80"
    depends_on:
      - gateway

volumes:
  postgres_data:
