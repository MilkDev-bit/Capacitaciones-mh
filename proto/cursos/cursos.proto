syntax = "proto3";

package cursos;

option go_package = "Prueba-Go/gen/cursos;cursospb";

// ─────────────────────────────────────────────────────────────────────────────
// CursosService: gestión de capacitaciones, inscripciones y asignaciones.
// ─────────────────────────────────────────────────────────────────────────────
service CursosService {
  // ── Público ──────────────────────────────────────────────────────────────
  rpc PreviewCurso(CodigoRequest) returns (CursoResponse);
  rpc GetCursoPublico(CursoIDRequest) returns (CursoResponse);
  rpc ListCursosPublicos(EmptyRequest) returns (ListCursosResponse);

  // ── Usuario autenticado ───────────────────────────────────────────────────
  rpc ListMisCapacitaciones(UserRequest) returns (ListCursosResponse);
  rpc GetCurso(CursoIDRequest) returns (CursoResponse);
  rpc Inscribirse(InscribirseRequest) returns (EmptyResponse);
  rpc UnirseConCodigo(UnirseRequest) returns (EmptyResponse);
  rpc UnirseConLicencia(UnirseConLicenciaRequest) returns (EmptyResponse);
  rpc WebhookEnroll(WebhookEnrollRequest) returns (EmptyResponse);
  rpc WebhookComprarLicencia(WebhookComprarLicenciaRequest) returns (EmptyResponse);
  rpc WebhookComprarB2BDirect(WebhookComprarB2BDirectRequest) returns (EmptyResponse);
  rpc CreateCheckoutSession(CheckoutSessionRequest) returns (CheckoutSessionResponse);
  rpc CreateCheckoutSessionB2BDirect(CreateCheckoutSessionB2BDirectRequest) returns (CheckoutSessionResponse);
  rpc CreateCheckoutSessionCart(CheckoutCartRequest) returns (CheckoutSessionResponse);
  rpc ListLicencias(ListLicenciasRequest) returns (ListLicenciasResponse);
  rpc GetLicenciaPublica(LicenciaIDRequest) returns (LicenciaPublicaResponse);
  rpc ListLicenciasCompradas(UserRequest) returns (ListLicenciasResponse);
  rpc ListLicenciaTickets(LicenciaIDRequest) returns (ListLicenciaTicketsResponse);

  // ── Instructor ────────────────────────────────────────────────────────────
  rpc InstructorListCapacitaciones(UserRequest) returns (ListCursosResponse);
  rpc InstructorCreateCapacitacion(CreateCursoRequest) returns (CursoResponse);
  rpc InstructorUpdateCapacitacion(UpdateCursoRequest) returns (CursoResponse);
  rpc InstructorDeleteCapacitacion(CursoIDRequest) returns (EmptyResponse);
  rpc InstructorTogglePublic(CursoIDRequest) returns (CursoResponse);
  rpc InstructorResetCodigo(CursoIDRequest) returns (CursoResponse);
  rpc InstructorListEstudiantes(UserRequest) returns (ListEstudiantesResponse);
  rpc InstructorAsignar(AsignarRequest) returns (EmptyResponse);
  
  rpc InstructorCreateLicencia(CreateLicenciaRequest) returns (Licencia);
  rpc InstructorUpdateLicencia(UpdateLicenciaRequest) returns (Licencia);
  rpc InstructorDeleteLicencia(LicenciaIDRequest) returns (EmptyResponse);

  // ── Admin ─────────────────────────────────────────────────────────────────
  rpc AdminListCapacitaciones(EmptyRequest) returns (ListCursosResponse);
  rpc AdminCreateCapacitacion(CreateCursoRequest) returns (CursoResponse);
  rpc AdminUpdateCapacitacion(UpdateCursoRequest) returns (CursoResponse);
  rpc AdminDeleteCapacitacion(CursoIDRequest) returns (EmptyResponse);
  rpc AdminListAsignaciones(EmptyRequest) returns (ListAsignacionesResponse);
  rpc AdminAsignar(AsignarRequest) returns (EmptyResponse);
  rpc AdminDesAsignar(AsignacionIDRequest) returns (EmptyResponse);

  // Videocall & Schedules
  rpc JoinVideocall(JoinVideocallRequest) returns (JoinVideocallResponse);
  rpc LeaveVideocall(LeaveVideocallRequest) returns (EmptyResponse);
  rpc EndVideocall(CursoIDRequest) returns (EmptyResponse);

  rpc AdminListSchedules(UserRequest) returns (ListSchedulesResponse);
  rpc AdminCreateSchedule(CreateScheduleRequest) returns (InstructorSchedule);
  rpc AdminUpdateSchedule(UpdateScheduleRequest) returns (InstructorSchedule);
  rpc AdminDeleteSchedule(ScheduleIDRequest) returns (EmptyResponse);

  rpc ListPublicSchedules(ListPublicSchedulesRequest) returns (ListPublicSchedulesResponse);

  // Obtiene estadísticas del dashboard de ventas y ganancias (solo admin)
  rpc GetAdminDashboardStats(EmptyRequest) returns (AdminDashboardStatsResponse);
}

// ── Requests ─────────────────────────────────────────────────────────────────

message EmptyRequest  {}
message UserRequest   { string user_id = 1; }
message CursoIDRequest { string curso_id = 1; string user_id = 2; }
message CodigoRequest { string codigo = 1; }
message AsignacionIDRequest { string asignacion_id = 1; }

message CreateCursoRequest {
  string user_id         = 1; // instructor o admin que lo crea
  string title           = 2;
  string description     = 3;
  string type            = 4;
  string content         = 5;
  string file_path       = 6;
  bool   is_public       = 7;
  string welcome_message = 8;
  string thumbnail_url   = 9;
  string color           = 10;
  double precio          = 11;
  string scheduled_at    = 12;
  int32  duration        = 13;
}

message UpdateCursoRequest {
  string curso_id        = 1;
  string user_id         = 2;
  string title           = 3;
  string description     = 4;
  string type            = 5;
  string content         = 6;
  string file_path       = 7;
  bool   is_public       = 8;
  string welcome_message = 9;
  string thumbnail_url   = 10;
  string color           = 11;
  double precio          = 12;
  string scheduled_at    = 13;
  string videocall_status = 14;
  int32  duration        = 15;
}

message InscribirseRequest {
  string user_id  = 1;
  string curso_id = 2;
}

message UnirseRequest {
  string user_id = 1;
  string codigo  = 2;
}

message AsignarRequest {
  string requester_id     = 1; // quien asigna (instructor o admin)
  string target_user_id   = 2;
  string capacitacion_id  = 3;
  string examen_id        = 4;
}

// ── Responses ────────────────────────────────────────────────────────────────

message CursoResponse {
  string id              = 1;
  string title           = 2;
  string description     = 3;
  string type            = 4;
  string file_path       = 5;
  string content         = 6;
  string instructor_id   = 7;
  bool   is_public       = 8;
  string codigo_acceso   = 9;
  string welcome_message = 10;
  string thumbnail_url   = 11;
  string color           = 12;
  string created_at      = 13;
  double precio          = 14;
  string scheduled_at    = 15;
  string videocall_status = 16;
  int32  duration        = 17;
}

message ListCursosResponse {
  repeated CursoResponse cursos = 1;
}

message EstudianteInfo {
  string user_id    = 1;
  string name       = 2;
  string email      = 3;
  string assigned_at = 4;
}

message ListEstudiantesResponse {
  repeated EstudianteInfo estudiantes = 1;
}

message AsignacionInfo {
  string id              = 1;
  string user_id         = 2;
  string user_name       = 3;
  string capacitacion_id = 4;
  string examen_id       = 5;
  string assigned_at     = 6;
}

message ListAsignacionesResponse {
  repeated AsignacionInfo asignaciones = 1;
}

message EmptyResponse {}

message Licencia {
  string id = 1;
  string capacitacion_id = 2;
  string nombre = 3;
  double precio = 4;
  int32 capacidad_maxima = 5;
  int32 usadas = 6;
  string codigo_acceso = 7;
  string stripe_product_id = 8;
  string stripe_price_id = 9;
  string comprador_id = 10;
  string created_at = 11;
}

message LicenciaPublicaResponse {
  string id = 1;
  string nombre = 2;
  double precio = 3;
  int32 capacidad_maxima = 4;
  string capacitacion_id = 5;
  string capacitacion_titulo = 6;
  string capacitacion_thumbnail = 7;
}

message CreateLicenciaRequest {
  string capacitacion_id = 1;
  string nombre = 2;
  double precio = 3;
  int32 capacidad_maxima = 4;
  string instructor_id = 5; // used to auto-add as group admin
}

message UpdateLicenciaRequest {
  string id = 1;
  string nombre = 2;
  double precio = 3;
  int32 capacidad_maxima = 4;
}

message LicenciaIDRequest {
  string id = 1;
}

message ListLicenciasRequest {
  string capacitacion_id = 1;
}

message ListLicenciasResponse {
  repeated Licencia licencias = 1;
}

message UnirseConLicenciaRequest {
  string user_id = 1;
  string capacitacion_id = 2;
  string codigo_acceso = 3;
}

message WebhookEnrollRequest {
  string user_id = 1;
  string capacitacion_id = 2;
  string licencia_id = 3;
  string schedule_id = 4;
}

message CartItem {
  string curso_id = 1;
  int32 cantidad = 2;
  string type = 3; // "b2c" | "b2b_direct"
  string schedule_id = 4;
}

message CheckoutCartRequest {
  string user_id = 1;
  repeated CartItem items = 2;
  string success_url = 3;
  string cancel_url = 4;
}

message WebhookComprarLicenciaRequest {
  string user_id = 1;
  string licencia_id = 2;
}

message CheckoutSessionRequest {
  string user_id = 1;
  string licencia_id = 2; // optional, used for B2B payment flow (if still supported)
  string success_url = 3;
  string cancel_url = 4;
  string curso_id = 5; // optional, used for individual B2C course purchase
  string schedule_id = 6; // optional, for videocall bookings
}

message CheckoutSessionResponse {
  string url = 1;
}

message AdminDashboardStatsResponse {
  float total_ventas_brutas = 1;
  float total_ventas_netas = 2; // Brutas descontando tarifas Stripe aproximadas (3.6% + 3 MXN)
  int32 total_transacciones = 3;
  int32 licencias_vendidas = 4;
  int32 compras_individuales = 5;
}

message CreateCheckoutSessionB2BDirectRequest {
  string user_id = 1;
  string curso_id = 2;
  int32 cantidad = 3;
  string success_url = 4;
  string cancel_url = 5;
  string schedule_id = 6; // optional, for videocall bookings
}

message WebhookComprarB2BDirectRequest {
  string user_id = 1;
  string curso_id = 2;
  int32 cantidad = 3;
  string schedule_id = 4;
}

message ListLicenciaTicketsResponse {
  repeated VideocallTicket tickets = 1;
}

message InstructorSchedule {
  string id = 1;
  string instructor_id = 2;
  string start_time = 3;
  string end_time = 4;
  string status = 5;
  string created_at = 6;
}

message ScheduleIDRequest {
  string schedule_id = 1;
}

message ListSchedulesResponse {
  repeated InstructorSchedule schedules = 1;
}

message CreateScheduleRequest {
  string instructor_id = 1;
  string start_time = 2;
  string end_time = 3;
}

message UpdateScheduleRequest {
  string schedule_id = 1;
  string start_time = 2;
  string end_time = 3;
  string status = 4;
}

message JoinVideocallRequest {
  string user_id = 1;
  string codigo = 2;
}

message JoinVideocallResponse {
  string room_name = 1;
  string token = 2;
}

message LeaveVideocallRequest {
  string user_id = 1;
  string codigo = 2;
}

message VideocallTicket {
  string id = 1;
  string capacitacion_id = 2;
  string licencia_id = 3;
  string codigo = 4;
  string in_use_by_user = 5;
  bool is_valid = 6;
}

message ListPublicSchedulesRequest {
  string instructor_id = 1;
}

message ListPublicSchedulesResponse {
  repeated InstructorSchedule schedules = 1;
}
