syntax = "proto3";

package mensajes;

option go_package = "Prueba-Go/gen/mensajes;mensajespb";

service MensajesService {
  rpc SendMensaje          (SendMensajeRequest)        returns (MensajeResponse);
  rpc GetMensajes          (GetMensajesRequest)        returns (GetMensajesResponse);
  rpc ListConversaciones   (ListConversacionesRequest) returns (ListConversacionesResponse);
  rpc NoLeidos             (NoLeidosRequest)           returns (NoLeidosResponse);
  rpc MarcarLeido          (MarcarLeidoRequest)        returns (MarcarLeidoResponse);
  rpc MarcarLeidos         (MarcarLeidosRequest)       returns (Empty);
  rpc CreateGroup          (CreateGroupRequest)        returns (CreateGroupResponse);
  rpc AddGroupMembers      (AddGroupMembersRequest)    returns (Empty);
  rpc GetGroupMembers      (GetGroupMembersRequest)    returns (GetGroupMembersResponse);
  // Licencia / cohorte group management (called by cursos-service)
  rpc CreateGroupForLicencia (CreateGroupForLicenciaRequest) returns (CreateGroupResponse);
  rpc EnrollInLicenciaGroup  (EnrollInLicenciaGroupRequest)  returns (Empty);
}

message SendMensajeRequest {
  string emisor_id       = 1;
  string emisor_name     = 2;
  string receptor_id     = 3;
  string receptor_name   = 4;
  string contenido       = 5;
  string attachment_url  = 6;
  string attachment_type = 7;
  bool   is_group        = 8;
}

message GetMensajesRequest {
  string user_id   = 1;
  string peer_id   = 2;
  int32  limit     = 3;
  string before_id = 4;
  bool   is_group  = 5;
}

message ListConversacionesRequest {
  string user_id = 1;
}

message NoLeidosRequest {
  string user_id = 1;
}

message MarcarLeidoRequest {
  string msg_id  = 1;
  string user_id = 2;
}

message MarcarLeidosRequest {
  string user_id  = 1;
  string peer_id  = 2;
  bool   is_group = 3;
}

message MensajeResponse {
  string id              = 1;
  string emisor_id       = 2;
  string emisor_name     = 3;
  string receptor_id     = 4;
  string receptor_name   = 5;
  string contenido       = 6;
  bool   leido           = 7;
  string created_at      = 8;
  string attachment_url  = 9;
  string attachment_type = 10;
  bool   is_group        = 11;
}

message GetMensajesResponse {
  repeated MensajeResponse mensajes = 1;
  bool has_more = 2;
}

message ConversacionResponse {
  string peer_id      = 1;
  string peer_name    = 2;
  string last_message = 3;
  string last_time    = 4;
  int32  unread_count = 5;
  bool   is_group     = 6;
}

message ListConversacionesResponse {
  repeated ConversacionResponse conversaciones = 1;
}

message NoLeidosResponse {
  int32 count = 1;
}

message MarcarLeidoResponse {
  bool   ok        = 1;
  string emisor_id = 2;
}

message CreateGroupRequest {
  string nombre   = 1;
  string admin_id = 2;
  repeated string members = 3;
}

message CreateGroupResponse {
  string grupo_id = 1;
  string nombre   = 2;
}

message AddGroupMembersRequest {
  string grupo_id = 1;
  repeated string user_ids = 2;
}

message GetGroupMembersRequest {
  string grupo_id = 1;
}

message GetGroupMembersResponse {
  repeated string user_ids = 1;
}

message CreateGroupForLicenciaRequest {
  string licencia_id = 1;
  string nombre      = 2;
  string admin_id    = 3;
}

message EnrollInLicenciaGroupRequest {
  string licencia_id = 1;
  string user_id     = 2;
  string user_name   = 3;
}

message Empty {}
