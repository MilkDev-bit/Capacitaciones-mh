syntax = "proto3";

package usuarios;

option go_package = "Prueba-Go/gen/usuarios;usuariospb";

// ─────────────────────────────────────────────────────────────────────────────
// UsuariosService: gestión de perfiles, administración y gamificación.
// ─────────────────────────────────────────────────────────────────────────────
service UsuariosService {
  // Devuelve el perfil del usuario autenticado.
  rpc GetPerfil(GetPerfilRequest) returns (PerfilResponse);

  // Actualiza bio, teléfono, especialidad, nombre.
  rpc UpdatePerfil(UpdatePerfilRequest) returns (PerfilResponse);

  // Guarda la URL de avatar (la subida a R2 la hace el Gateway).
  rpc UpdateAvatarURL(UpdateMediaURLRequest) returns (PerfilResponse);

  // Guarda la URL de portada (la subida a R2 la hace el Gateway).
  rpc UpdateCoverURL(UpdateMediaURLRequest) returns (PerfilResponse);

  // Cambia el rol del usuario a "instructor".
  rpc BecomeInstructor(UserIDRequest) returns (PerfilResponse);

  // Perfil público de cualquier usuario (acceso autenticado).
  rpc GetPublicPerfil(UserIDRequest) returns (PerfilResponse);

  // Lista todos los usuarios (solo admin).
  rpc ListUsers(ListUsersRequest) returns (ListUsersResponse);

  // Desactiva/elimina un usuario (solo admin).
  rpc DeleteUser(UserIDRequest) returns (EmptyResponse);

  // Busca usuarios por nombre o correo.
  rpc SearchUsers(SearchUsersRequest) returns (SearchUsersResponse);

  // Cambia el rol de cualquier usuario (solo admin).
  rpc AdminUpdateRole(AdminUpdateRoleRequest) returns (PerfilResponse);

  // Notificaciones
  rpc ListNotificaciones(UserIDRequest)              returns (ListNotificacionesResponse);
  rpc MarkNotificacionesRead(MarkNotificacionesReadRequest) returns (EmptyResponse);

  // ── Gamificación: Insignias ───────────────────────────────────────────────
  // Devuelve todas las insignias desbloqueadas de un usuario.
  rpc GetUserBadges(UserIDRequest) returns (UserBadgesResponse);
  // Interno: otorga una insignia a un usuario (llamado desde lecciones-service).
  rpc AwardBadge(AwardBadgeRequest) returns (EmptyResponse);
}

// ── Requests ─────────────────────────────────────────────────────────────────

message GetPerfilRequest {
  string user_id = 1;
}

message UpdatePerfilRequest {
  string user_id   = 1;
  string name      = 2;
  string bio       = 3;
  string phone     = 4;
  string specialty = 5;
}

message UpdateMediaURLRequest {
  string user_id = 1;
  string url     = 2;
}

message AdminUpdateRoleRequest {
  string admin_id       = 1;
  string target_user_id = 2;
  string new_role       = 3;
}

message UserIDRequest {
  string user_id = 1;
}

message ListUsersRequest {
  string role   = 1; // filtro opcional: "user", "instructor", "admin"
  int32  page   = 2;
  int32  limit  = 3;
}

message SearchUsersRequest {
  string query        = 1;
  int32  limit        = 2;
  string requester_id = 3;
}

message MarkNotificacionesReadRequest {
  string          user_id = 1;
  repeated string ids     = 2;
}

// ── Requests de Gamificación ──────────────────────────────────────────────────

message AwardBadgeRequest {
  string user_id   = 1;
  // Identificador canónico de la insignia (ej. "memorama_master", "first_lesson").
  string badge_slug = 2;
}

// ── Responses ────────────────────────────────────────────────────────────────

message PerfilResponse {
  string id           = 1;
  string name         = 2;
  string email        = 3;
  string role         = 4;
  string bio          = 5;
  string avatar_url   = 6;
  string cover_url    = 7;
  string phone        = 8;
  string specialty    = 9;
  string created_at   = 10;
  // Gamificación: puntos acumulados globales del usuario.
  int32  points_total = 11;
}

message ListUsersResponse {
  repeated UserSummary users = 1;
  int32                total = 2;
}

message UserSummary {
  string id         = 1;
  string name       = 2;
  string email      = 3;
  string role       = 4;
  string created_at = 5;
  string avatar_url = 6;
}

message SearchUsersResponse {
  repeated UserSummary users = 1;
}

message Notificacion {
  string id         = 1;
  string user_id    = 2;
  string tipo       = 3;
  string titulo     = 4;
  string mensaje    = 5;
  bool   leida      = 6;
  string enlace     = 7;
  string created_at = 8;
}

message ListNotificacionesResponse {
  repeated Notificacion notificaciones = 1;
}

// ── Responses de Gamificación ─────────────────────────────────────────────────

// Catálogo de insignias disponibles (metadata para el frontend).
message Badge {
  string slug        = 1; // identificador único, ej. "memorama_master"
  string name        = 2; // nombre legible: "Maestro del Memorama"
  string description = 3;
  string icon_url    = 4; // imagen de la insignia
  string color       = 5; // color de acento en hex, ej. "#f59e0b"
  // Cuándo se desbloqueó (vacío si no está desbloqueada para este usuario).
  string unlocked_at = 6;
}

message UserBadgesResponse {
  string         user_id = 1;
  repeated Badge badges  = 2;
}

message EmptyResponse {}
