syntax = "proto3";

package foros;

option go_package = "Prueba-Go/gen/foros;forospb";

// ─────────────────────────────────────────────────────────────────────────────
// ForosService: posts, comentarios y likes del foro de cada lección.
// ─────────────────────────────────────────────────────────────────────────────
service ForosService {
  // ── Usuario autenticado ───────────────────────────────────────────────────
  rpc ListForoPosts(LeccionRequest) returns (ListPostsResponse);
  rpc CreateForoPost(CreatePostRequest) returns (PostResponse);
  rpc DeleteForoPost(PostUserRequest) returns (EmptyResponse);

  rpc ListForoComentarios(PostUserRequest) returns (ListComentariosResponse);
  rpc CreateForoComentario(CreateComentarioRequest) returns (ComentarioResponse);

  rpc ToggleForoPostReaction(PostReactionRequest) returns (ReactionResponse);
  rpc ToggleForoComentarioReaction(ComentarioReactionRequest) returns (ReactionResponse);
}

// ── Requests ─────────────────────────────────────────────────────────────────

message LeccionRequest  { string leccion_id = 1; string user_id = 2; }
message PostRequest     { string post_id = 1; }
message PostUserRequest { string post_id = 1; string user_id = 2; }

message CreatePostRequest {
  string leccion_id  = 1;
  string user_id     = 2;
  string titulo      = 3;
  string contenido   = 4;
  string media_url   = 5;
  string media_type  = 6;
}

message CreateComentarioRequest {
  string post_id   = 1;
  string user_id   = 2;
  string contenido = 3;
  string parent_id = 4;
}

message PostReactionRequest {
  string post_id = 1;
  string user_id = 2;
  string emoji   = 3;
}

message ComentarioReactionRequest {
  string comentario_id = 1;
  string user_id       = 2;
  string emoji         = 3;
}

// ── Responses ────────────────────────────────────────────────────────────────

message Reaction {
  string emoji        = 1;
  int32  count        = 2;
  bool   user_reacted = 3;
}

message PostResponse {
  string id         = 1;
  string leccion_id = 2;
  string user_id    = 3;
  string user_name  = 4;
  string titulo     = 5;
  string contenido  = 6;
  string media_url  = 7;
  string media_type = 8;
  repeated Reaction reactions = 9;
  string created_at = 11;
}

message ListPostsResponse {
  repeated PostResponse posts = 1;
}

message ComentarioResponse {
  string id         = 1;
  string post_id    = 2;
  string user_id    = 3;
  string user_name  = 4;
  string contenido  = 5;
  string created_at = 6;
  string parent_id  = 7;
  repeated Reaction reactions = 8;
}

message ListComentariosResponse {
  repeated ComentarioResponse comentarios = 1;
}

message ReactionResponse {
  repeated Reaction reactions = 1;
}

message EmptyResponse {}
