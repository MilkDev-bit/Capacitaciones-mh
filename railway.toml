[build]
builder        = "dockerfile"
dockerfilePath = "gateway/Dockerfile"
buildArgs      = { VITE_RECAPTCHA_SITE_KEY = "${{VITE_RECAPTCHA_SITE_KEY}}" }

[deploy]
restartPolicyType       = "on_failure"
restartPolicyMaxRetries = 3
healthcheckPath         = "/api/health"
healthcheckTimeout      = 30
