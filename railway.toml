[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
healthcheckPath = "/api/health"
healthcheckTimeout = 30

# Volumen persistente: Railway monta este path entre deploys.
# Crear el volumen en el dashboard de Railway y asignarlo a este servicio
# con mountPath = "/app/uploads"
[[volumes]]
mountPath = "/app/uploads"
